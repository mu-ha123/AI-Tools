<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作输出记录 - AI 工具箱</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        :root {
            --bg: #0f1419; --card: #1a2332; --accent: #3b82f6; --accent-hover: #2563eb;
            --text: #e7ecf3; --muted: #94a3b8; --border: #2d3a4f; --success: #22c55e;
            --warn: #eab308; --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .layout { max-width: 1100px; margin: 0 auto; padding: 24px; }
        .nav { margin-bottom: 24px; }
        .nav a { color: var(--accent); text-decoration: none; }
        h1 { font-size: 1.8rem; margin-bottom: 6px; }
        .subtitle { color: var(--muted); margin-bottom: 24px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .card h2 { font-size: 1.1rem; margin-bottom: 16px; }
        label { display: block; color: var(--muted); font-size: 0.85rem; margin-bottom: 4px; }
        input, select, textarea {
            width: 100%; padding: 10px 12px; margin-bottom: 12px;
            background: #0d1117; border: 1px solid var(--border); border-radius: 8px; color: var(--text);
        }
        textarea { resize: vertical; min-height: 80px; font-family: inherit; }
        button {
            padding: 10px 18px; background: var(--accent); color: white; border: none;
            border-radius: 8px; cursor: pointer; font-size: 0.95rem;
        }
        button:hover { background: var(--accent-hover); }
        button.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
        button.secondary:hover { border-color: var(--accent); }
        button.small { padding: 4px 10px; font-size: 0.8rem; }
        button.danger { background: var(--danger); }
        button.danger:hover { background: #dc2626; }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .msg { padding: 10px; border-radius: 8px; margin-bottom: 12px; font-size: 0.9rem; }
        .msg.error { background: rgba(239,68,68,0.15); color: #fca5a5; }
        .msg.success { background: rgba(34,197,94,0.15); color: #86efac; }
        .empty { text-align: center; color: var(--muted); padding: 40px 0; }

        .view-tabs { display: flex; gap: 0; margin-bottom: 16px; }
        .view-tab {
            padding: 8px 24px; cursor: pointer; border: 1px solid var(--border);
            background: transparent; color: var(--muted); font-size: 0.9rem;
        }
        .view-tab:first-child { border-radius: 8px 0 0 8px; }
        .view-tab:last-child { border-radius: 0 8px 8px 0; }
        .view-tab.active { background: var(--accent); color: white; border-color: var(--accent); }
        .view-tab:hover:not(.active) { border-color: var(--accent); }

        .nav-bar {
            display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
        }
        .nav-bar .date-label { font-size: 1.1rem; font-weight: 600; min-width: 160px; text-align: center; }
        .nav-btn {
            padding: 6px 14px; background: transparent; border: 1px solid var(--border);
            color: var(--text); border-radius: 6px; cursor: pointer; font-size: 1rem;
        }
        .nav-btn:hover { border-color: var(--accent); }
        .today-btn { font-size: 0.85rem; padding: 6px 14px; }

        .range-picker {
            display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
        }
        .range-picker .flatpickr-input {
            flex: 1; max-width: 280px; margin-bottom: 0; cursor: pointer;
        }

        .stats-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
        .stat-item {
            padding: 6px 14px; border-radius: 20px; font-size: 0.85rem;
            background: rgba(59,130,246,0.1); border: 1px solid var(--border);
        }
        .stat-item .count { font-weight: 700; margin-left: 4px; }

        .record-list { list-style: none; }
        .date-group { margin-bottom: 20px; }
        .date-group-header {
            font-size: 0.85rem; color: var(--muted); margin-bottom: 8px;
            padding-bottom: 4px; border-bottom: 1px solid var(--border);
        }
        .record-item {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 12px; border-radius: 8px; margin-bottom: 6px;
            background: #0d1117; border-left: 3px solid var(--accent);
        }
        .record-item .info { flex: 1; min-width: 0; }
        .record-item .info .title { font-weight: 600; margin-bottom: 4px; }
        .record-item .info .desc { font-size: 0.85rem; color: var(--muted); white-space: pre-wrap; }
        .record-item .meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 6px; }
        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 0.75rem; color: white; font-weight: 500;
        }
        .type-badge {
            display: inline-block; padding: 2px 6px; border-radius: 4px;
            font-size: 0.7rem; background: var(--border); color: var(--muted);
        }
        .record-actions { display: flex; gap: 6px; flex-shrink: 0; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .modal { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 90%; max-width: 520px; max-height: 80vh; overflow-y: auto; }
        .modal h3 { margin-bottom: 16px; }
        .modal .actions { justify-content: flex-end; margin-top: 16px; }

        .color-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .color-opt {
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
            border: 2px solid transparent; transition: border-color 0.2s;
        }
        .color-opt:hover, .color-opt.active { border-color: white; }

        .category-tabs { display: flex; gap: 0; margin-bottom: 16px; flex-wrap: wrap; }
        .category-tab {
            padding: 6px 16px; cursor: pointer; border: 1px solid var(--border);
            background: transparent; color: var(--muted); font-size: 0.85rem;
        }
        .category-tab:first-child { border-radius: 8px 0 0 8px; }
        .category-tab:last-child { border-radius: 0 8px 8px 0; }
        .category-tab.active { background: var(--accent); color: white; border-color: var(--accent); }
        .category-tab:hover:not(.active) { border-color: var(--accent); }

        .date-range-row { display: flex; gap: 12px; }
        .date-range-row > div { flex: 1; }
        .date-range-row .flatpickr-input { margin-bottom: 12px; cursor: pointer; }

        .flatpickr-calendar {
            background: var(--card) !important;
            border: 1px solid var(--border) !important;
        }
        .flatpickr-months .flatpickr-month,
        .flatpickr-current-month .flatpickr-monthDropdown-months,
        span.flatpickr-weekday,
        .flatpickr-weekdaycontainer {
            background: var(--card) !important;
            color: var(--text) !important;
        }
        .flatpickr-day {
            color: var(--text) !important;
        }
        .flatpickr-day.today {
            border-color: var(--accent) !important;
        }
        .flatpickr-day.selected,
        .flatpickr-day.startRange,
        .flatpickr-day.endRange,
        .flatpickr-day.inRange {
            background: var(--accent) !important;
            border-color: var(--accent) !important;
        }
        .flatpickr-day:hover {
            background: var(--border) !important;
        }
        .flatpickr-day.flatpickr-disabled {
            color: var(--muted) !important;
        }
        .flatpickr-months .flatpickr-prev-month svg,
        .flatpickr-months .flatpickr-next-month svg {
            fill: var(--text) !important;
        }
        .numInputWrapper span.arrowUp,
        .numInputWrapper span.arrowDown {
            border-color: var(--muted) !important;
        }
        .flatpickr-current-month .numInputWrapper span.arrowUp:after {
            border-bottom-color: var(--text) !important;
        }
        .flatpickr-current-month .numInputWrapper span.arrowDown:after {
            border-top-color: var(--text) !important;
        }
    </style>
</head>
<body>
<div class="layout">
    <div class="nav"><a href="/">← 返回工具箱</a></div>
    <h1>工作输出记录</h1>
    <p class="subtitle">按日/周/月/自定义时间范围记录工作任务输出，支持分类管理与 Excel 导出</p>
    <div id="message"></div>

    <div class="card">
        <div class="actions" style="margin-bottom:12px;justify-content:space-between">
            <div class="view-tabs" id="viewTabs" style="margin-bottom:0"></div>
            <div class="actions" style="margin-bottom:0">
                <button class="secondary small" onclick="showCategoryModal()">分类管理</button>
                <button class="secondary small" onclick="exportExcel()">导出 Excel</button>
                <button onclick="showAddRecord()">+ 新增记录</button>
            </div>
        </div>

        <div id="navBar" class="nav-bar">
            <button class="nav-btn" onclick="navigate(-1)">‹</button>
            <span class="date-label" id="dateLabel"></span>
            <button class="nav-btn" onclick="navigate(1)">›</button>
            <button class="today-btn secondary small" onclick="goToday()">今天</button>
        </div>

        <div id="rangePicker" class="range-picker" style="display:none">
            <input type="text" id="rangeFlatpickr" placeholder="选择日期范围..." class="flatpickr-input">
        </div>

        <div class="category-tabs" id="categoryTabs"></div>
        <div class="stats-row" id="statsRow"></div>

        <div id="recordContainer">
            <div class="empty">暂无记录</div>
        </div>
    </div>
</div>

<div id="recordModal" class="modal-overlay" style="display:none" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <h3 id="recordModalTitle">新增记录</h3>
        <input type="hidden" id="editRecordId">
        <label>分类</label>
        <select id="editCategoryId"></select>
        <label>时间范围</label>
        <div class="date-range-row">
            <div>
                <label style="font-size:0.75rem">开始日期</label>
                <input type="text" id="editStartDate" class="flatpickr-input" placeholder="选择开始日期">
            </div>
            <div>
                <label style="font-size:0.75rem">结束日期</label>
                <input type="text" id="editEndDate" class="flatpickr-input" placeholder="选择结束日期">
            </div>
        </div>
        <label>标题</label>
        <input type="text" id="editTitle" placeholder="请输入工作标题">
        <label>工作内容</label>
        <textarea id="editDescription" rows="4" placeholder="请输入工作内容描述"></textarea>
        <div class="actions">
            <button class="secondary" onclick="closeModalById('recordModal')">取消</button>
            <button onclick="saveRecord()">保存</button>
        </div>
    </div>
</div>

<div id="categoryModal" class="modal-overlay" style="display:none" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <h3>分类管理</h3>
        <div id="categoryList"></div>
        <hr style="border-color:var(--border);margin:16px 0">
        <label>新增分类</label>
        <input type="text" id="newCategoryName" placeholder="分类名称">
        <label>颜色</label>
        <div class="color-picker" id="colorPicker"></div>
        <input type="hidden" id="newCategoryColor" value="#3b82f6">
        <div class="actions">
            <button class="secondary" onclick="closeModalById('categoryModal')">关闭</button>
            <button onclick="saveNewCategory()">添加分类</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    let currentViewType = 'DAY';
    let currentDate = new Date();
    let currentCategories = [];
    let currentRecords = [];
    let selectedCategoryId = null;

    let rangeFlatpickr = null;
    let startDatePicker = null;
    let endDatePicker = null;

    const COLORS = ['#3b82f6','#22c55e','#eab308','#ef4444','#a855f7','#ec4899','#14b8a6','#f97316'];

    function formatDate(d) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return y + '-' + m + '-' + day;
    }

    function getMonday(d) {
        const date = new Date(d);
        const day = date.getDay();
        const diff = date.getDate() - day + (day === 0 ? -6 : 1);
        date.setDate(diff);
        return date;
    }

    function getSunday(d) {
        const mon = getMonday(d);
        const sun = new Date(mon);
        sun.setDate(sun.getDate() + 6);
        return sun;
    }

    function getDateLabel() {
        switch (currentViewType) {
            case 'WEEK': {
                const mon = getMonday(currentDate);
                const sun = getSunday(currentDate);
                const m = String(mon.getMonth()+1).padStart(2,'0');
                const md = String(mon.getDate()).padStart(2,'0');
                const sm = String(sun.getMonth()+1).padStart(2,'0');
                const sd = String(sun.getDate()).padStart(2,'0');
                return mon.getFullYear() + '-' + m + '-' + md + ' ~ ' + sm + '-' + sd;
            }
            case 'MONTH': {
                const y = currentDate.getFullYear();
                const m = String(currentDate.getMonth()+1).padStart(2,'0');
                return y + '年' + m + '月';
            }
            default: return formatDate(currentDate);
        }
    }

    function getDateParam() {
        return formatDate(currentDate);
    }

    function showMsg(text, type) {
        const el = document.getElementById('message');
        el.className = 'msg ' + type;
        el.textContent = text;
        setTimeout(() => { el.className = ''; el.textContent = ''; }, 4000);
    }

    async function api(url, options) {
        const res = await fetch(url, options);
        const data = await res.json();
        if (!data.success) throw new Error(data.message || '请求失败');
        return data.data;
    }

    function closeModal(e) {
        if (e && e.target.className === 'modal-overlay') {
            e.target.style.display = 'none';
        }
    }
    function closeModalById(id) {
        document.getElementById(id).style.display = 'none';
    }

    function initViewTabs() {
        const container = document.getElementById('viewTabs');
        const views = [
            { key: 'DAY', label: '日' },
            { key: 'WEEK', label: '周' },
            { key: 'MONTH', label: '月' },
            { key: 'CUSTOM', label: '自定义' }
        ];
        container.innerHTML = '';
        views.forEach(v => {
            const btn = document.createElement('button');
            btn.className = 'view-tab' + (v.key === currentViewType ? ' active' : '');
            btn.textContent = v.label;
            btn.onclick = () => switchView(v.key);
            container.appendChild(btn);
        });
    }

    function switchView(type) {
        currentViewType = type;
        document.querySelectorAll('.view-tab').forEach(b => {
            const label = b.textContent;
            const key = label === '日' ? 'DAY' : label === '周' ? 'WEEK' : label === '月' ? 'MONTH' : 'CUSTOM';
            b.className = 'view-tab' + (key === type ? ' active' : '');
        });

        if (type === 'CUSTOM') {
            document.getElementById('navBar').style.display = 'none';
            document.getElementById('rangePicker').style.display = 'flex';
            if (rangeFlatpickr && !rangeFlatpickr.selectedDates.length) {
                const monday = getMonday(new Date());
                const sunday = getSunday(new Date());
                rangeFlatpickr.setDate([monday, sunday]);
            }
            if (rangeFlatpickr) {
                rangeFlatpickr.open();
            }
        } else {
            document.getElementById('navBar').style.display = 'flex';
            document.getElementById('rangePicker').style.display = 'none';
            selectedCategoryId = null;
            renderCategoryTabs();
            loadRecords();
        }
    }

    function navigate(dir) {
        switch (currentViewType) {
            case 'DAY':
                currentDate.setDate(currentDate.getDate() + dir);
                break;
            case 'WEEK':
                currentDate.setDate(currentDate.getDate() + dir * 7);
                break;
            case 'MONTH':
                currentDate.setMonth(currentDate.getMonth() + dir);
                break;
        }
        loadRecords();
    }

    function goToday() {
        currentDate = new Date();
        loadRecords();
    }

    function initFlatpickr() {
        rangeFlatpickr = flatpickr('#rangeFlatpickr', {
            mode: 'range',
            dateFormat: 'Y-m-d',
            locale: { rangeSeparator: ' ~ ' },
            defaultDate: [getMonday(new Date()), getSunday(new Date())],
            onChange: function(selectedDates) {
                if (selectedDates.length === 2) {
                    loadCustomRange();
                }
            },
            onReady: function() {
                this.close();
            }
        });

        startDatePicker = flatpickr('#editStartDate', {
            dateFormat: 'Y-m-d',
            onChange: function(selectedDates, dateStr) {
                if (selectedDates.length && endDatePicker) {
                    endDatePicker.set('minDate', dateStr);
                }
            }
        });

        endDatePicker = flatpickr('#editEndDate', {
            dateFormat: 'Y-m-d',
            onChange: function(selectedDates, dateStr) {
                if (selectedDates.length && startDatePicker) {
                    startDatePicker.set('maxDate', dateStr);
                }
            }
        });
    }

    function initColorPicker() {
        const container = document.getElementById('colorPicker');
        container.innerHTML = '';
        COLORS.forEach(c => {
            const div = document.createElement('div');
            div.className = 'color-opt' + (c === '#3b82f6' ? ' active' : '');
            div.style.background = c;
            div.onclick = () => {
                document.querySelectorAll('.color-opt').forEach(el => el.className = 'color-opt');
                div.className = 'color-opt active';
                document.getElementById('newCategoryColor').value = c;
            };
            container.appendChild(div);
        });
    }

    function buildRecordsUrl(categoryId) {
        if (currentViewType === 'CUSTOM') {
            const dates = rangeFlatpickr ? rangeFlatpickr.selectedDates : [];
            if (dates.length < 2) return null;
            const start = formatDate(dates[0]);
            const end = formatDate(dates[1]);
            let url = '/api/work/records?start=' + start + '&end=' + end;
            if (categoryId) url += '&categoryId=' + categoryId;
            return url;
        }
        const date = getDateParam();
        let url = '/api/work/records?viewType=' + currentViewType + '&date=' + date;
        if (categoryId) url += '&categoryId=' + categoryId;
        return url;
    }

    async function loadCategories() {
        try {
            currentCategories = await api('/api/work/categories');
            renderCategoryTabs();
            renderCategoryList();
            populateCategorySelect();
        } catch (e) { showMsg(e.message, 'error'); }
    }

    function renderCategoryTabs() {
        const container = document.getElementById('categoryTabs');
        container.innerHTML = '';
        const all = document.createElement('button');
        all.className = 'category-tab' + (selectedCategoryId === null ? ' active' : '');
        all.textContent = '全部';
        all.onclick = () => { selectedCategoryId = null; renderCategoryTabs(); fetchRecordsByCategory(null); };
        container.appendChild(all);
        currentCategories.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'category-tab' + (selectedCategoryId === c.id ? ' active' : '');
            btn.textContent = c.name;
            btn.style.borderColor = c.color;
            btn.onclick = () => { selectedCategoryId = c.id; renderCategoryTabs(); fetchRecordsByCategory(c.id); };
            container.appendChild(btn);
        });
    }

    async function fetchRecordsByCategory(categoryId) {
        const url = buildRecordsUrl(categoryId);
        if (!url) {
            currentRecords = [];
            renderRecords();
            renderStats();
            return;
        }
        try {
            currentRecords = await api(url);
            updateDateLabel();
            renderRecords();
            renderStats();
        } catch (e) { showMsg(e.message, 'error'); }
    }

    function updateDateLabel() {
        if (currentViewType === 'CUSTOM') {
            const dates = rangeFlatpickr ? rangeFlatpickr.selectedDates : [];
            if (dates.length === 2) {
                document.getElementById('dateLabel').textContent = formatDate(dates[0]) + ' ~ ' + formatDate(dates[1]);
            }
        } else {
            document.getElementById('dateLabel').textContent = getDateLabel();
        }
    }

    function renderCategoryList() {
        const container = document.getElementById('categoryList');
        if (currentCategories.length === 0) {
            container.innerHTML = '<div style="color:var(--muted);padding:8px 0">暂无分类</div>';
            return;
        }
        container.innerHTML = '';
        currentCategories.forEach(c => {
            const div = document.createElement('div');
            div.style.cssText = 'display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)';
            const dot = document.createElement('span');
            dot.style.cssText = 'width:12px;height:12px;border-radius:50%;background:' + c.color + ';display:inline-block';
            const nameSpan = document.createElement('span');
            nameSpan.style.cssText = 'flex:1';
            nameSpan.textContent = c.name;
            if (c.default) {
                const tag = document.createElement('span');
                tag.style.cssText = 'font-size:0.7rem;color:var(--muted);background:var(--border);padding:2px 6px;border-radius:4px;margin-left:6px';
                tag.textContent = '预置';
                nameSpan.appendChild(tag);
            }
            div.appendChild(dot);
            div.appendChild(nameSpan);
            if (!c.default) {
                const delBtn = document.createElement('button');
                delBtn.className = 'danger small';
                delBtn.textContent = '删除';
                delBtn.onclick = () => deleteCategory(c.id);
                div.appendChild(delBtn);
            }
            container.appendChild(div);
        });
    }

    function populateCategorySelect(selectedId) {
        const sel = document.getElementById('editCategoryId');
        sel.innerHTML = '';
        currentCategories.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = c.name;
            if (selectedId && c.id === selectedId) opt.selected = true;
            sel.appendChild(opt);
        });
    }

    function getDateRange() {
        if (currentViewType === 'CUSTOM') {
            const dates = rangeFlatpickr ? rangeFlatpickr.selectedDates : [];
            if (dates.length === 2) {
                return { start: formatDate(dates[0]), end: formatDate(dates[1]) };
            }
            const mon = getMonday(new Date());
            const sun = getSunday(new Date());
            return { start: formatDate(mon), end: formatDate(sun) };
        }
        const date = getDateParam();
        switch (currentViewType) {
            case 'WEEK': {
                const mon = getMonday(currentDate);
                const sun = getSunday(currentDate);
                return { start: formatDate(mon), end: formatDate(sun) };
            }
            case 'MONTH': {
                const first = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
                const last = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0);
                return { start: formatDate(first), end: formatDate(last) };
            }
            default: return { start: date, end: date };
        }
    }

    async function loadRecords() {
        selectedCategoryId = null;
        renderCategoryTabs();
        const url = buildRecordsUrl(null);
        if (!url) return;
        try {
            currentRecords = await api(url);
            updateDateLabel();
            renderRecords();
            renderStats();
        } catch (e) { showMsg(e.message, 'error'); }
    }

    async function loadCustomRange() {
        selectedCategoryId = null;
        renderCategoryTabs();
        const url = buildRecordsUrl(null);
        if (!url) return;
        try {
            currentRecords = await api(url);
            updateDateLabel();
            renderRecords();
            renderStats();
        } catch (e) { showMsg(e.message, 'error'); }
    }

    function renderStats() {
        const container = document.getElementById('statsRow');
        container.innerHTML = '';
        const countMap = {};
        currentRecords.forEach(r => {
            const key = r.categoryName || '未分类';
            countMap[key] = (countMap[key] || 0) + 1;
        });
        const entries = Object.entries(countMap);
        if (entries.length === 0) {
            container.innerHTML = '<span style="color:var(--muted);font-size:0.85rem">暂无数据</span>';
            return;
        }
        entries.forEach(([name, count]) => {
            const cat = currentCategories.find(c => c.name === name);
            const div = document.createElement('span');
            div.className = 'stat-item';
            div.innerHTML = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + (cat ? cat.color : 'var(--muted)') + ';margin-right:6px"></span>' + name + '<span class="count">' + count + '</span>';
            container.appendChild(div);
        });
    }

    function renderRecords() {
        const container = document.getElementById('recordContainer');
        if (currentRecords.length === 0) {
            container.innerHTML = '<div class="empty">暂无记录</div>';
            return;
        }

        const grouped = {};
        currentRecords.forEach(r => {
            const key = r.recordDate;
            if (!grouped[key]) grouped[key] = [];
            grouped[key].push(r);
        });

        const sortedDates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

        let html = '<div class="record-list">';
        sortedDates.forEach(date => {
            const weekday = ['日','一','二','三','四','五','六'][new Date(date).getDay()];
            html += '<div class="date-group">';
            html += '<div class="date-group-header">' + date + ' 周' + weekday + ' (' + grouped[date].length + ' 条)</div>';
            grouped[date].forEach(r => {
                const typeLabel = r.dateType === 'WEEK' ? '周' : r.dateType === 'MONTH' ? '月' : '日';
                let rangeInfo = '';
                if (r.endDate && r.endDate !== r.recordDate) {
                    const ed = r.endDate.slice(0,10);
                    rangeInfo = '<span style="color:var(--muted);font-size:0.78rem;margin-left:6px">' + r.recordDate + ' ~ ' + ed + '</span>';
                }
                html += '<div class="record-item" style="border-left-color:' + (r.categoryColor || 'var(--accent)') + '">';
                html += '<div class="info">';
                html += '<div class="title">' + escHtml(r.title) + '</div>';
                if (r.description) {
                    html += '<div class="desc">' + escHtml(r.description) + '</div>';
                }
                html += '<div class="meta">';
                html += '<span class="badge" style="background:' + (r.categoryColor || 'var(--accent)') + '">' + escHtml(r.categoryName) + '</span>';
                html += '<span class="type-badge">' + typeLabel + '</span>';
                html += rangeInfo;
                html += '</div></div>';
                html += '<div class="record-actions">';
                html += '<button class="secondary small" onclick="showEditRecord(' + r.id + ')">编辑</button>';
                html += '<button class="danger small" onclick="deleteRecord(' + r.id + ')">删除</button>';
                html += '</div></div>';
            });
            html += '</div>';
        });
        html += '</div>';
        container.innerHTML = html;
    }

    function escHtml(s) {
        if (!s) return '';
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function autoDetectDateType(startStr, endStr) {
        if (!startStr || !endStr) return 'DAY';
        if (startStr === endStr) return 'DAY';
        const start = new Date(startStr);
        const end = new Date(endStr);
        const mon = getMonday(start);
        const sun = getSunday(start);
        const isWeek = formatDate(mon) === startStr && formatDate(sun) === endStr;
        if (isWeek) return 'WEEK';
        const first = new Date(start.getFullYear(), start.getMonth(), 1);
        const last = new Date(start.getFullYear(), start.getMonth() + 1, 0);
        const isMonth = formatDate(first) === startStr && formatDate(last) === endStr;
        if (isMonth) return 'MONTH';
        return 'CUSTOM';
    }

    function showAddRecord() {
        document.getElementById('recordModalTitle').textContent = '新增记录';
        document.getElementById('editRecordId').value = '';
        document.getElementById('editTitle').value = '';
        document.getElementById('editDescription').value = '';

        const range = getDateRange();
        if (startDatePicker) startDatePicker.setDate(range.start);
        if (endDatePicker) endDatePicker.setDate(range.end);

        populateCategorySelect();
        document.getElementById('recordModal').style.display = 'flex';
    }

    async function showEditRecord(id) {
        const record = currentRecords.find(r => r.id === id);
        if (!record) return;
        document.getElementById('recordModalTitle').textContent = '编辑记录';
        document.getElementById('editRecordId').value = id;
        document.getElementById('editTitle').value = record.title;
        document.getElementById('editDescription').value = record.description || '';
        if (startDatePicker) startDatePicker.setDate(record.recordDate);
        if (endDatePicker) endDatePicker.setDate(record.endDate || record.recordDate);
        populateCategorySelect(record.categoryId);
        document.getElementById('recordModal').style.display = 'flex';
    }

    async function saveRecord() {
        const id = document.getElementById('editRecordId').value;
        const categoryId = parseInt(document.getElementById('editCategoryId').value);
        const title = document.getElementById('editTitle').value.trim();
        const description = document.getElementById('editDescription').value.trim();
        const startDate = startDatePicker ? startDatePicker.selectedDates[0] : null;
        const endDate = endDatePicker ? endDatePicker.selectedDates[0] : null;
        const startStr = startDate ? formatDate(startDate) : '';
        const endStr = endDate ? formatDate(endDate) : startStr;
        const dateType = autoDetectDateType(startStr, endStr);

        if (!title) { showMsg('请输入标题', 'error'); return; }
        if (!startStr) { showMsg('请选择开始日期', 'error'); return; }

        const body = { categoryId, title, description, recordDate: startStr, endDate: endStr, dateType };
        try {
            if (id) {
                await api('/api/work/records/' + id, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
                showMsg('记录已更新', 'success');
            } else {
                await api('/api/work/records', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
                showMsg('记录已创建', 'success');
            }
            closeModalById('recordModal');
            fetchRecordsByCategory(selectedCategoryId);
        } catch (e) { showMsg(e.message, 'error'); }
    }

    async function deleteRecord(id) {
        if (!confirm('确定要删除该记录吗？')) return;
        try {
            await api('/api/work/records/' + id, { method: 'DELETE' });
            showMsg('记录已删除', 'success');
            fetchRecordsByCategory(selectedCategoryId);
        } catch (e) { showMsg(e.message, 'error'); }
    }

    function showCategoryModal() {
        document.getElementById('newCategoryName').value = '';
        document.getElementById('newCategoryColor').value = '#3b82f6';
        document.querySelectorAll('.color-opt').forEach((el, i) => {
            el.className = 'color-opt' + (i === 0 ? ' active' : '');
        });
        renderCategoryList();
        document.getElementById('categoryModal').style.display = 'flex';
    }

    async function saveNewCategory() {
        const name = document.getElementById('newCategoryName').value.trim();
        const color = document.getElementById('newCategoryColor').value;
        if (!name) { showMsg('请输入分类名称', 'error'); return; }
        try {
            await api('/api/work/categories', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ name, color })
            });
            showMsg('分类已添加', 'success');
            document.getElementById('newCategoryName').value = '';
            await loadCategories();
        } catch (e) { showMsg(e.message, 'error'); }
    }

    async function deleteCategory(id) {
        if (!confirm('确定要删除该分类吗？')) return;
        try {
            await api('/api/work/categories/' + id, { method: 'DELETE' });
            showMsg('分类已删除', 'success');
            await loadCategories();
            fetchRecordsByCategory(selectedCategoryId === id ? null : selectedCategoryId);
        } catch (e) { showMsg(e.message, 'error'); }
    }

    async function exportExcel() {
        const range = getDateRange();
        const s = range.start;
        const e = range.end;
        try {
            const res = await fetch('/api/work/export?start=' + s + '&end=' + e);
            if (!res.ok) throw new Error('导出失败');
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '工作输出记录_' + s + '_' + e + '.xlsx';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showMsg('导出成功', 'success');
        } catch (e) { showMsg(e.message, 'error'); }
    }

    initViewTabs();
    initColorPicker();
    initFlatpickr();
    loadCategories();
    loadRecords();
</script>
</body>
</html>
